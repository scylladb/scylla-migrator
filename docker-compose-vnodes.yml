# Overlay that forces vnodes mode on ScyllaDB services.
# Not needed for ScyllaDB < 6.3 (vnodes is the default there).
# Use with docker-compose-dynamodb.yml (only overrides scylla).
# For docker-compose-scylla.yml, use docker-compose-vnodes-scylla.yml instead.
services:
  scylla:
    command: >
      --smp 1
      --memory 2048M
      --alternator-port 8000
      --alternator-write-isolation only_rmw_uses_lwt
      --tablets-mode-for-new-keyspaces disabled
