name: Tests
on:
  push:
    branches:
      - master
    paths:
      - '**.scala'
      - '**.sbt'
      - 'Makefile'
      - 'Dockerfile'
      - 'dockerfiles/**'
      - 'docker-compose-*.yml'
      - '.github/workflows/**'

  pull_request:
    paths:
      - '**.scala'
      - '**.sbt'
      - 'Makefile'
      - 'Dockerfile'
      - 'dockerfiles/**'
      - 'docker-compose-*.yml'
      - '.github/workflows/**'

jobs:
  lint:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Check formatting
        run: make lint

  build:
    name: Build
    uses: ./.github/workflows/build.yml

  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Cache SBT compilation artifacts
        uses: actions/cache@v4
        with:
          path: |
            target/
            migrator/target/scala-2.13/classes/
            tests/target/scala-2.13/classes/
            spark-kinesis-dynamodb/target/scala-2.13/classes/
            project/target/
          key: sbt-target-${{ runner.os }}-${{ hashFiles('**/*.scala', '**/*.sbt', 'project/build.properties') }}
          restore-keys: |
            sbt-target-${{ runner.os }}-
      - name: Run unit tests
        run: make test-unit

  test-integration-scylla:
    name: Integration tests (Scylla)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Cache SBT compilation artifacts
        uses: actions/cache@v4
        with:
          path: |
            target/
            migrator/target/scala-2.13/classes/
            tests/target/scala-2.13/classes/
            spark-kinesis-dynamodb/target/scala-2.13/classes/
            project/target/
          key: sbt-target-${{ runner.os }}-${{ hashFiles('**/*.scala', '**/*.sbt', 'project/build.properties') }}
          restore-keys: |
            sbt-target-${{ runner.os }}-
      - name: Start services
        run: make start-services-scylla
      - name: Wait for services
        run: make wait-for-services-scylla
      - name: Dump container logs on failure
        if: failure()
        run: make dump-logs-scylla
      - name: Run Scylla integration tests
        run: make test-integration-scylla
        env:
          COVERAGE: ${{ github.event_name == 'push' && 'true' || 'false' }}
      - name: Run E2E sanity tests (Scylla only)
        if: success()
        run: make test-benchmark-e2e-sanity-scylla
      - name: Stop services
        if: always()
        run: make stop-services-scylla
      - name: Upload coverage report
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-scylla
          path: |
            tests/target/scala-2.13/scoverage-report/
            migrator/target/scala-2.13/scoverage-report/

  test-integration-dynamodb:
    name: Integration tests (DynamoDB ${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "scylla-6.2"
            scylla-version: "6.2"
            tablets-mode: "tablets"
          - name: "latest-vnodes"
            scylla-version: "latest"
            tablets-mode: "vnodes"
          - name: "latest-tablets"
            scylla-version: "latest"
            tablets-mode: "tablets"
    env:
      SCYLLA_VERSION: ${{ matrix.scylla-version }}
      TABLETS_MODE: ${{ matrix.tablets-mode }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Cache SBT compilation artifacts
        uses: actions/cache@v4
        with:
          path: |
            target/
            migrator/target/scala-2.13/classes/
            tests/target/scala-2.13/classes/
            spark-kinesis-dynamodb/target/scala-2.13/classes/
            project/target/
          key: sbt-target-${{ runner.os }}-${{ hashFiles('**/*.scala', '**/*.sbt', 'project/build.properties') }}
          restore-keys: |
            sbt-target-${{ runner.os }}-
      - name: Start services
        run: make start-services-dynamodb
      - name: Wait for services
        run: make wait-for-services-dynamodb
      - name: Dump container logs on failure
        if: failure()
        run: make dump-logs-dynamodb
      - name: Run DynamoDB integration tests
        run: make test-integration-dynamodb
        env:
          COVERAGE: ${{ github.event_name == 'push' && 'true' || 'false' }}
      - name: Run E2E sanity tests (DynamoDB)
        if: success()
        run: make test-benchmark-e2e-sanity-dynamodb
      - name: Stop services
        if: always()
        run: make stop-services-dynamodb
      - name: Upload coverage report
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-dynamodb-${{ matrix.name }}
          path: |
            tests/target/scala-2.13/scoverage-report/
            migrator/target/scala-2.13/scoverage-report/

  test-integration-cassandra:
    name: Integration tests (Cassandra ${{ matrix.version }}.x)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [2, 3, 5]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Cache SBT compilation artifacts
        uses: actions/cache@v4
        with:
          path: |
            target/
            migrator/target/scala-2.13/classes/
            tests/target/scala-2.13/classes/
            spark-kinesis-dynamodb/target/scala-2.13/classes/
            project/target/
          key: sbt-target-${{ runner.os }}-${{ hashFiles('**/*.scala', '**/*.sbt', 'project/build.properties') }}
          restore-keys: |
            sbt-target-${{ runner.os }}-
      - name: Start services
        run: make start-services-cassandra CASSANDRA_VERSION=${{ matrix.version }}
      - name: Wait for services
        run: make wait-for-services-cassandra CASSANDRA_VERSION=${{ matrix.version }}
      - name: Dump container logs on failure
        if: failure()
        run: make dump-logs-scylla
      - name: Run Cassandra ${{ matrix.version }}.x tests
        run: make test-integration-cassandra CASSANDRA_VERSION=${{ matrix.version }}
      - name: Stop services
        if: always()
        run: make stop-services-scylla
