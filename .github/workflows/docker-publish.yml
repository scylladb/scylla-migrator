name: Publish Docker image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build (e.g. v2.0.0)"
        required: true

env:
  BUILDKIT_PROGRESS: plain

jobs:
  publish:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Resolve git tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "git_tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "git_tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag format
        run: |
          GIT_TAG="${{ steps.resolve.outputs.git_tag }}"
          if ! echo "${GIT_TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid tag '${GIT_TAG}'. Must match vX.Y.Z (e.g. v2.0.0)"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve.outputs.git_tag }}
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve Docker tags
        id: tags
        run: |
          GIT_TAG="${{ steps.resolve.outputs.git_tag }}"
          VERSION="${GIT_TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Find the latest version tag by semver sort
          LATEST=$(git tag -l 'v*' | sed 's/^v//' | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)
          if [ "${VERSION}" = "${LATEST}" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            scylladb/scylla-migrator:${{ steps.tags.outputs.version }}
            ${{ steps.tags.outputs.is_latest == 'true' && 'scylladb/scylla-migrator:latest' || '' }}
