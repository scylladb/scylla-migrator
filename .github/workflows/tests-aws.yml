name: Tests with AWS
on:
  push:
    branches:
      - master
    paths:
      - '**.scala'
      - '**.sbt'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  test-aws:
    name: AWS integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Cache SBT compilation artifacts
        uses: actions/cache@v4
        with:
          path: |
            target/
            migrator/target/scala-2.13/classes/
            tests/target/scala-2.13/classes/
            spark-kinesis-dynamodb/target/scala-2.13/classes/
            project/target/
          key: sbt-target-${{ runner.os }}-${{ hashFiles('**/*.scala', '**/*.sbt', 'project/build.properties') }}
          restore-keys: |
            sbt-target-${{ runner.os }}-
      - name: Start services
        run: make start-services-aws
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
      - name: Wait for services
        run: make wait-for-services-aws
      - name: Dump container logs on failure
        if: failure()
        run: make dump-logs
      - name: Run AWS integration tests
        run: make test-integration-aws
      - name: Stop services
        run: make stop-services
