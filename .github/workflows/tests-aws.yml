name: Tests with AWS
on:
  push:
    branches:
      - master
    paths:
      - '**.scala'
      - '**.sbt'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  test-aws:
    name: AWS integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - uses: sbt/setup-sbt@af116cce31c00823d3903ce687f9cda3a4f19f1b # v1.2.1
      - name: Cache SBT compilation artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target/
            migrator/target/scala-2.13/classes/
            tests/target/scala-2.13/classes/
            spark-kinesis-dynamodb/target/scala-2.13/classes/
            project/target/
          key: sbt-target-${{ runner.os }}-${{ hashFiles('**/*.scala', '**/*.sbt', 'project/build.properties') }}
          restore-keys: |
            sbt-target-${{ runner.os }}-
      - name: Start services
        run: make start-services-aws
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
      - name: Wait for services
        run: make wait-for-services-aws
      - name: Dump container logs on failure
        if: failure()
        run: make dump-logs
      - name: Run AWS integration tests
        run: make test-integration-aws
      - name: Stop services
        run: make stop-services
