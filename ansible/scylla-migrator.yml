---

- name: Install spark on scylla-migrator servers
  hosts: spark
  vars:
    home_dir: /home/ubuntu
    spark_home: /opt/spark
    spark_version: "4.0.2"
    spark_package: "spark-{{ spark_version }}-bin-hadoop3"
    cqlsh_venv: "{{ home_dir }}/.venvs/scylla-cqlsh"
  tasks: 
    - name: add universe repository
      become: true
      shell: sudo add-apt-repository universe -y

    - name: Update apt-cache
      become: true
      apt:
        update_cache: yes

    - name: Install package dependencies.
      become: true
      package: name={{ item }} state=present
      with_items:
        - openjdk-17-jre
        - openjdk-17-jdk
        - unzip
        - python3-pip
        - python3-venv

    - name: Discover JAVA_HOME
      shell: dirname $(dirname $(readlink -f $(which java)))
      register: java_home_result
      changed_when: false

    - name: Set JAVA_HOME fact
      ansible.builtin.set_fact:
        java_home: "{{ java_home_result.stdout }}"

    - name: Set JAVA_HOME
      ansible.builtin.lineinfile:
        path: "{{ home_dir }}/.profile"
        regexp: '^JAVA_HOME='
        line: "export JAVA_HOME={{ java_home }}"

    - name: install cqlsh in a virtualenv
      ansible.builtin.pip:
        name: scylla-cqlsh
        state: present
        virtualenv: "{{ cqlsh_venv }}"
        virtualenv_command: python3 -m venv

    - name: expose cqlsh on PATH
      become: true
      ansible.builtin.file:
        src: "{{ cqlsh_venv }}/bin/cqlsh"
        dest: /usr/local/bin/cqlsh
        state: link
        force: true

    - name: Check that awscliv2.zip exists
      stat:
        path: awscliv2.zip
      register: stat_result

    - name: Download the awscli bundle.
      get_url: 
        url: "https://awscli.amazonaws.com/awscli-exe-linux-{{ 'aarch64' if ansible_architecture in ['aarch64', 'arm64'] else 'x86_64' }}.zip"
        dest: "{{ home_dir }}/awscliv2.zip"
      when: not stat_result.stat.exists
      register: aws_cli_download_bundle

    - name: Unarchive the installer.
      unarchive: 
        src: "{{ home_dir }}/awscliv2.zip"
        dest: "{{ home_dir }}"
        remote_src: yes
        
      when: aws_cli_download_bundle.changed
      register: aws_cli_unarchive_installer

    - name: install awscli v2
      become: true
      shell: "sudo {{ home_dir }}/aws/install --update"

    - name: Delete aws zip file
      ansible.builtin.file:
        state: absent
        path: "{{ home_dir }}/awscliv2.zip"

    - name: Delete aws install directory
      ansible.builtin.file:
        state: absent
        path: "{{ home_dir }}/aws"

    - name: Download spark
      get_url: 
        url: "https://archive.apache.org/dist/spark/spark-{{ spark_version }}/{{ spark_package }}.tgz"
        dest: "{{ home_dir }}/{{ spark_package }}.tgz"

    - name: Extract spark
      ansible.builtin.unarchive:
        src: "{{ home_dir }}/{{ spark_package }}.tgz"
        dest: "{{ home_dir }}"
        remote_src: yes

    - name: Empty spark home
      become: true
      ansible.builtin.file:
        state: absent
        path: "{{ spark_home }}"

    - name: Move spark to opt/spark
      become: true
      command: "sudo mv {{ home_dir }}/{{ spark_package }} {{ spark_home }}"

    - name: Add JAVA_HOME to PATH
      ansible.builtin.lineinfile:
        path: "{{ home_dir }}/.profile"
        regexp: '^:$JAVA_HOME'
        line: export PATH=$PATH:$JAVA_HOME

    - name: Set SPARK_HOME
      ansible.builtin.lineinfile:
        path: "{{ home_dir }}/.profile"
        regexp: '^:SPARK_HOME'
        line: "export SPARK_HOME={{ spark_home }}"

    - name: Add SPARK_HOME/bin to path
      ansible.builtin.lineinfile:
        path: "{{ home_dir }}/.profile"
        regexp: '^:$SPARK_HOME/bin'
        line: export PATH=$PATH:$SPARK_HOME/bin

    - name: Add SPARK_HOME/sbin to path
      ansible.builtin.lineinfile:
        path: "{{ home_dir }}/.profile"
        regexp: '^:$SPARK_HOME/sbin'
        line: export PATH=$PATH:$SPARK_HOME/sbin

    - name: Make sure slaves file exists
      become: true
      ansible.builtin.file:
        state: touch
        path: "{{ spark_home }}/conf/slaves"

    - name: Add spark nodes to slaves file
      lineinfile:
        dest: "{{ spark_home }}/conf/slaves"
        state: present
        line:  "{{ hostvars[item].ansible_host }}"
      with_items: "{{ groups['spark'] }}"

    - name: copy worker start/stop convenience scripts
      copy:
        src: "{{ item }}"
        dest: "{{ home_dir }}"
        mode: 0755
      when: inventory_hostname in groups['worker']
      with_items:
        - start-slave.sh
        - stop-slave.sh

    - name: copy template
      template:
        src: spark-env-worker-sample
        dest: "{{ home_dir }}"
      when: inventory_hostname in groups['worker']

    - name: rename spark-env
      shell: mv spark-env-worker-sample spark-env
      when: inventory_hostname in groups['worker']

- name: Install scylla migrator on master
  hosts: master
  vars:
    home_dir: /home/ubuntu
    spark_home: /opt/spark
    java_home_arch: "{{ 'arm64' if ansible_architecture in ['aarch64', 'arm64'] else 'amd64' }}"
    java_home_default: "{{ '/usr/lib/jvm/java-17-openjdk-' ~ java_home_arch }}"
    master_java_home: "{{ hostvars[inventory_hostname].java_home | default(java_home_default) }}"
  environment:
    JAVA_HOME: "{{ master_java_home }}"
    SPARK_HOME: /opt/spark
    PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/ubuntu/.local/share/coursier/bin:{{ master_java_home }}:/opt/spark/bin:/opt/spark/sbin"

  tasks:
    - name: Create scylla-migrator directory
      ansible.builtin.file:
        path: "{{ home_dir }}/scylla-migrator"
        state: directory

    - name: copy master start/stop convenience scripts
      copy:
        src: "{{ item }}"
        dest: "{{ home_dir }}/scylla-migrator"
        mode: 0755
      with_items:
        - start-spark.sh
        - stop-spark.sh
        - start-slave.sh
        - stop-slave.sh
        - config.dynamodb.yml
    
    - name: copy template
      template:
        src: "{{ item }}"
        dest: "{{ home_dir }}/scylla-migrator"
        mode: 0755
      with_items:
        - spark-env-master-sample
        - submit-alternator-job.sh
        - submit-cql-job.sh
        - submit-cql-job-validator.sh

    - name: rename spark-env
      shell: cd "{{ home_dir }}/scylla-migrator" && mv spark-env-master-sample spark-env

    - name: change file permissions - spark-env and config.dynamodb.yml
      ansible.builtin.file:
        mode: 0655
        state: file
        path: "{{ home_dir }}/scylla-migrator/{{ item }}"
      with_items:
        - spark-env
        - config.dynamodb.yml

    - name: download scylla-migrator
      get_url:
        url: https://github.com/scylladb/scylla-migrator/releases/latest/download/scylla-migrator-assembly.jar
        dest: "{{ home_dir }}/scylla-migrator/scylla-migrator-assembly.jar"
...
