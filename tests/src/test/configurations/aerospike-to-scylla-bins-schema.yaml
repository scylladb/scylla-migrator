# Set name must match BinsSchemaSetName in BasicMigrationTest.scala
source:
  type: aerospike
  hosts:
    - aerospike
  namespace: test
  set: binsschema
  bins:
    - foo
  schema:
    foo: string

target:
  type: scylla
  host: scylla
  port: 9042
  localDC: datacenter1
  credentials:
    username: dummy
    password: dummy
  keyspace: test
  table: binsschema
  consistencyLevel: LOCAL_QUORUM
  connections: 16
  stripTrailingZerosForDecimals: false

savepoints:
  path: /app/savepoints
  intervalSeconds: 300
