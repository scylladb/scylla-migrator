# Set name must match SchemaSetName in BasicMigrationTest.scala
source:
  type: aerospike
  hosts:
    - aerospike
  namespace: test
  set: schematest
  schema:
    foo: string
    bar: long

target:
  type: scylla
  host: scylla
  port: 9042
  localDC: datacenter1
  credentials:
    username: dummy
    password: dummy
  keyspace: test
  table: schematest
  consistencyLevel: LOCAL_QUORUM
  connections: 16
  stripTrailingZerosForDecimals: false

savepoints:
  path: /app/savepoints
  intervalSeconds: 300
