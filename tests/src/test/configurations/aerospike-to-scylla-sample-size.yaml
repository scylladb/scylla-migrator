# Set name must match BasicSetName in BasicMigrationTest.scala
# Tests schemaSampleSize override (item #19)
source:
  type: aerospike
  hosts:
    - aerospike
  namespace: test
  set: basictest
  schemaSampleSize: 1

target:
  type: scylla
  host: scylla
  port: 9042
  localDC: datacenter1
  credentials:
    username: dummy
    password: dummy
  keyspace: test
  table: basictest
  consistencyLevel: LOCAL_QUORUM
  connections: 16
  stripTrailingZerosForDecimals: false

savepoints:
  path: /app/savepoints
  intervalSeconds: 300
