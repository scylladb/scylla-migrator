source:
  type: parquet
  path: /app/parquet/gcs-savepoints

target:
  type: scylla
  host: scylla
  port: 9042
  localDC: datacenter1
  credentials:
    username: dummy
    password: dummy
  keyspace: test
  table: gcssavepointstest
  consistencyLevel: LOCAL_QUORUM
  connections: 16
  stripTrailingZerosForDecimals: false

savepoints:
  intervalSeconds: 1
  target:
    type: gcs
    bucket: migrator-savepoints
    prefix: parquet-gcs-savepoints
