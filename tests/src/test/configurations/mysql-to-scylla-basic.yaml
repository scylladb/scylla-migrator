source:
  type: mysql
  host: mysql
  port: 3306
  database: testdb
  table: users
  credentials:
    username: migrator
    password: migrator
  primaryKey:
    - id
  partitionColumn: id
  numPartitions: 4
  lowerBound: 0
  upperBound: 1000
  # Use fetchSize 100-200 for tables with large BLOBs (50MB+ per row).
  # Use fetchSize 1000+ for tables with mostly small rows.
  fetchSize: 200

target:
  type: scylla
  host: scylla
  port: 9042
  localDC: datacenter1
  credentials:
    username: dummy
    password: dummy
  keyspace: test
  table: users
  consistencyLevel: LOCAL_QUORUM
  connections: 16
  stripTrailingZerosForDecimals: false

savepoints:
  path: /app/savepoints
  intervalSeconds: 300

validation:
  compareTimestamps: false
  ttlToleranceMillis: 0
  writetimeToleranceMillis: 0
  failuresToFetch: 100
  floatingPointTolerance: 0.001
  timestampMsTolerance: 1000
