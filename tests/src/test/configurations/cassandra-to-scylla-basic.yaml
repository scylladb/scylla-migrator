source:
  type: cassandra
  host: scylla
  port: 9042
  credentials:
    accessKey: dummy
    secretKey: dummy
  table: BasicTest
  maxMapTasks: 1

target:
  type: scylladb
  host: scylla
  port: 8000
  table: BasicTest
  credentials:
    accessKey: dummy
    secretKey: dummy
  maxMapTasks: 1
  streamChanges: false

renames: []

# Below are unused but mandatory settings
savepoints:
  path: /app/savepoints
  intervalSeconds: 300
skipTokenRanges: []
validation:
  compareTimestamps: true
  ttlToleranceMillis: 60000
  writetimeToleranceMillis: 1000
  failuresToFetch: 100
  floatingPointTolerance: 0.001
  timestampMsTolerance: 0
