source:
  type: cassandra
  host: cassandra
  port: 9042
  localDC: datacenter1
  credentials:
    username: dummy
    password: dummy
  keyspace: test
  table: timestamptest
  consistencyLevel: LOCAL_QUORUM
  preserveTimestamps: true
  splitCount: 8
  connections: 8
  fetchSize: 1000

target:
  type: parquet
  path: /app/parquet/timestamps
  compression: gzip
  mode: overwrite

savepoints:
  path: /app/savepoints
  intervalSeconds: 300
