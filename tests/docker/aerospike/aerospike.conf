service {
  proto-fd-max 1024
}

logging {
  console {
    context any info
  }
}

network {
  service {
    address any
    port 3000
  }

  heartbeat {
    mode mesh
    port 3002
  }

  fabric {
    port 3001
  }
}

namespace test {
  replication-factor 1
  default-ttl 0
  nsup-period 10

  storage-engine memory {
    data-size 1G
  }
}
