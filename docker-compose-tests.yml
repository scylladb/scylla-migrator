services:

  dynamodb:
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    image: "amazon/dynamodb-local:2.5.3"
    expose:
      - 8001
    ports:
      - "8001:8000"
    working_dir: /home/dynamodblocal

  aerospike:
    # Aerospike Server 7.x is AGPL v3 licensed. Used here only for integration testing.
    image: aerospike/aerospike-server:7.2
    volumes:
      - ./tests/docker/aerospike/aerospike.conf:/etc/aerospike/aerospike.conf
    ports:
      - "3000:3000"
    expose:
      - 3000
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  aerospike6:
    # Aerospike 6.4 — minimum supported version (scanPartitions requires 6.0+).
    # Network alias "aerospike" allows Spark configs to connect without modification.
    # NOTE: Do not run aerospike and aerospike6 simultaneously — they share the "aerospike"
    # alias. The compat tests start only one version at a time via make targets.
    image: aerospike/aerospike-server:6.4
    volumes:
      - ./tests/docker/aerospike/aerospike.conf:/etc/aerospike/aerospike.conf
    ports:
      - "3001:3000"
    expose:
      - 3000
    networks:
      default:
        aliases:
          - aerospike
    healthcheck:
      test: ["CMD", "asinfo", "-v", "status"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  cassandra:
    image: cassandra:4.1
    environment:
      MAX_HEAP_SIZE: 256M
      HEAP_NEWSIZE: 64M
    volumes:
      - ./tests/docker/cassandra:/var/lib/cassandra
    ports:
      - "9043:9042"
    expose:
      - 9043

  cassandra5:
    image: cassandra:5.0
    environment:
      MAX_HEAP_SIZE: 256M
      HEAP_NEWSIZE: 64M
    volumes:
      - ./tests/docker/cassandra5:/var/lib/cassandra
    ports:
      - "9047:9042"
    expose:
      - 9047

  cassandra3:
    image: cassandra:3.11
    environment:
      MAX_HEAP_SIZE: 256M
      HEAP_NEWSIZE: 64M
    volumes:
      - ./tests/docker/cassandra3:/var/lib/cassandra
    ports:
      - "9045:9042"
    expose:
      - 9045

  cassandra2:
    image: cassandra:2.2
    environment:
      MAX_HEAP_SIZE: 256M
      HEAP_NEWSIZE: 64M
    volumes:
      - ./tests/docker/cassandra2:/var/lib/cassandra
    ports:
      - "9046:9042"
    expose:
      - 9046

  scylla-source:
    image: scylladb/scylla:2025.1
    volumes:
      - "./tests/docker/scylla-source:/var/lib/scylla"
    ports:
      - "8002:8000"
      - "9044:9042"
    expose:
      - 9044
    command: >
      --smp 1
      --memory 2048M
      --alternator-port 8000
      --alternator-write-isolation only_rmw_uses_lwt
      --tablets-mode-for-new-keyspaces disabled
  scylla:
    image: scylladb/scylla:2025.1
    volumes:
      - "./tests/docker/scylla:/var/lib/scylla"
    ports:
      - "8000:8000"
      - "9042:9042"
    command: >
      --smp 1
      --memory 2048M
      --alternator-port 8000
      --alternator-write-isolation only_rmw_uses_lwt
      --tablets-mode-for-new-keyspaces disabled

  s3:
    image: localstack/localstack:s3-latest
    ports:
      - "127.0.0.1:4566:4566"            # LocalStack Gateway
    environment:
      - DEBUG=${DEBUG:-0}
    volumes:
      - "./tests/docker/s3:/var/lib/localstack"

  spark-master:
    image: ${SPARK_IMAGE:-spark-migrator}
    build: dockerfiles/spark
    command: master
    environment:
      SPARK_PUBLIC_DNS: localhost
    expose:
      - 5005
    ports:
      - 127.0.0.1:4040:4040
      - 127.0.0.1:5005:5005
      - 127.0.0.1:8080:8080
    volumes:
      - ./migrator/target/scala-2.13:/jars
      - ./tests/src/test/configurations:/app/configurations
      - ./tests/docker/spark-master:/app/savepoints
      - ./tests/docker/aws-profile:/root/.aws
      - ./tests/docker/parquet:/app/parquet

  spark-worker:
    image: ${SPARK_IMAGE:-spark-migrator}
    build: dockerfiles/spark
    command: worker
    environment:
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 4G
      SPARK_WORKER_WEBUI_PORT: 8081
      SPARK_PUBLIC_DNS: localhost
    expose:
      - 5006
    ports:
      - 127.0.0.1:5006:5006
      - 127.0.0.1:8081:8081
    volumes:
      - ./tests/docker/parquet:/app/parquet
      - ./tests/docker/aws-profile:/root/.aws
    depends_on:
      - spark-master
